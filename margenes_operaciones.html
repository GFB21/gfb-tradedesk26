<html lang="es">
<head>
<meta charset="UTF-8">
<title>GFB — Márgenes 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;--border:#2a2d35;--border2:#353840;--text:#e8eaf0;--muted:#6b7280;--muted2:#9ca3af;--green:#4ade80;--green2:#22c55e;--red:#f87171;--amber:#fbbf24;--amber2:#d97706;--font:'Bricolage Grotesque',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
header{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--green)}
.hright{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
.tinp{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;width:220px}
.btn{background:var(--green2);color:#000;border:none;border-radius:8px;padding:8px 18px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--green)}.btn:disabled{background:var(--border2);color:var(--muted);cursor:not-allowed}
.sstrip{border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.sstrip-i{display:flex}
.sc{padding:13px 22px;border-right:1px solid var(--border);min-width:130px;flex-shrink:0}
.sc:last-child{border-right:none}
.sl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.sv{font-family:var(--mono);font-size:17px;font-weight:700}
.sv.g{color:var(--green)}.sv.r{color:var(--red)}.sv.a{color:var(--amber)}.sv.w{color:var(--text)}
.ss{font-size:11px;color:var(--muted);margin-top:1px}
.ctrls{padding:10px 24px;gap:8px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg);display:flex}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:220px}
.fs{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;cursor:pointer}
.ct{font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1300px}
thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border2);background:var(--surface);white-space:nowrap;position:sticky;top:53px;z-index:10}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody tr.wr{background:rgba(251,191,36,0.04)}
tbody tr.wr:hover{background:rgba(251,191,36,0.09)}
tbody td{padding:10px 12px;vertical-align:middle;white-space:nowrap}
td.r{text-align:right;font-family:var(--mono);font-size:11px}
td.ped{font-family:var(--mono);font-size:11px;font-weight:600}
td.cli{font-size:12px;color:var(--muted2);max-width:140px;overflow:hidden;text-overflow:ellipsis}
td.pro{font-size:11px;color:var(--muted2);max-width:160px;overflow:hidden;text-overflow:ellipsis}
td.inc{font-family:var(--mono);font-size:11px;color:var(--muted2)}
td.dt{font-family:var(--mono);font-size:11px;color:var(--muted)}
.vp{color:var(--green)}.vn{color:var(--red)}.vw{color:var(--amber);font-weight:600}.vm{color:var(--muted)}
.pp{display:inline-block;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:600}
.pp.g{background:rgba(74,222,128,0.12);color:var(--green)}.pp.r{background:rgba(248,113,113,0.12);color:var(--red)}.pp.a{background:rgba(251,191,36,0.12);color:var(--amber)}

.ob{display:inline-flex;align-items:center;gap:3px;background:rgba(74,222,128,0.1);color:var(--green);border-radius:4px;padding:2px 6px;font-size:10px}
.state{text-align:center;padding:80px 20px;color:var(--muted)}
.ico{font-size:48px;margin-bottom:14px;opacity:.4}
.lb{width:280px;height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin:18px auto 0}
.lbi{height:100%;background:var(--green2);border-radius:99px;animation:lp 1.2s ease-in-out infinite}
@keyframes lp{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
tfoot td{padding:11px 12px;border-top:2px solid var(--border2);font-weight:700;background:var(--surface);position:sticky;bottom:0}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

<script>
var PROXY = "https://delicate-sun-4d22.aremirez.workers.dev/";
var HOLDED_KEY = "";
var SK_H = "gfb_holded_key";

// ── TOKEN PERSISTENCE (igual que QUIQUITO) ────────────────────────────
function loadCfg() {
  HOLDED_KEY = localStorage.getItem(SK_H) || "";
  if (HOLDED_KEY) document.getElementById("hToken").value = HOLDED_KEY;
}
function saveCfg(key) {
  if (key) localStorage.setItem(SK_H, key);
}

// ── HOLDED API (igual que QUIQUITO) ───────────────────────────────────
async function hFetch(endpoint) {
  var res = await fetch(PROXY, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({service:"holded", url:"https://api.holded.com/api/"+endpoint, token:HOLDED_KEY})
  });
  if (!res.ok) throw new Error("Holded HTTP " + res.status);
  return await res.json();
}

async function hFetchAll(endpoint) {
  var all = [], page = 1, hasMore = true;
  while (hasMore && page <= 20) {
    var data = await hFetch(endpoint + "?page=" + page + "&limit=50");
    if (!Array.isArray(data) || data.length === 0) { hasMore = false; break; }
    all = all.concat(data);
    if (data.length < 50) hasMore = false;
    page++;
  }
  return all;
}

function findComm(docNum) {
  var n = (docNum || "").toUpperCase().replace(/^[A-Z]+/, "");
  if (!n) return null;
  var keys = Object.keys(CD);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].indexOf(n) !== -1) return CD[keys[i]];
  }
  return null;
}

// ── HELPERS ───────────────────────────────────────────────────────────
function eur(n) {
  if (n == null) return "—";
  return new Intl.NumberFormat("es-ES", {style:"currency", currency:"EUR", minimumFractionDigits:0, maximumFractionDigits:0}).format(n);
}
function eur2(n) {
  if (n == null) return "—";
  return new Intl.NumberFormat("es-ES", {minimumFractionDigits:2, maximumFractionDigits:2}).format(n) + " €";
}
function pct(n) { return n == null ? "—" : (n >= 0 ? "+" : "") + n.toFixed(1) + "%"; }
function fmtD(ts) { return ts ? new Date(ts*1000).toLocaleDateString("es-ES", {day:"2-digit", month:"2-digit", year:"2-digit"}) : "—"; }
function gT(doc) {
  if (!doc) return 0;
  return doc.total != null ? doc.total : (doc.subtotal != null ? doc.subtotal : (doc.amount != null ? doc.amount : 0));
}
function pp(n) {
  if (n == null) return '<span class="vm">—</span>';
  var c = n >= 15 ? "g" : n >= 5 ? "a" : "r";
  return '<span class="pp ' + c + '">' + pct(n) + '</span>';
}
function volCell(mN, vol, unit) {
  if (!vol || vol <= 0) return '<span class="vm">—</span>';
  var v = mN / vol;
  return '<span class="' + (v >= 0 ? "vp" : "vn") + '">' + eur2(v) + '/' + unit + '</span>';
}
function prog(msg, isErr) {
  document.getElementById("main").innerHTML =
    '<div class="state"><div class="ico">' + (isErr ? "⚠️" : "⚙️") + '</div>' +
    '<p style="color:' + (isErr ? "var(--red)" : "var(--text)") + '">' + msg + '</p>' +
    (isErr ? "" : '<div class="lb"><div class="lbi"></div></div>') +
    '</div>';
}

var rows = [];

// ── LOAD ALL (patrón exacto de QUIQUITO) ──────────────────────────────
async function loadAll() {
  HOLDED_KEY = document.getElementById("hToken").value.trim();
  if (!HOLDED_KEY) { alert("Introduce el token de Holded"); return; }
  saveCfg(HOLDED_KEY);

  var btn = document.getElementById("btnLoad");
  btn.disabled = true; btn.textContent = "Cargando...";
  document.getElementById("sstrip").style.display = "none";
  document.getElementById("ctrls").style.display = "none";

  try {
    prog("Cargando pedidos de venta (SO)...");
    var soList = await hFetchAll("invoicing/v1/documents/salesorder");

    prog("Cargando pedidos de compra (PO) — sin filtro de fecha...");
    var poList = await hFetchAll("invoicing/v1/documents/purchaseorder");

    prog("Construyendo mapa de costes...");

    // ── BUILD poMap exactamente igual que QUIQUITO ────────────────────
    // poMap[numericPart][prefix] = doc
    var poMap = {};
    poList.forEach(function(po) {
      var num = (po.docNumber || "").toUpperCase();
      var numericPart = num.replace(/^[A-Z]+/, "");
      if (!numericPart) return;
      if (!poMap[numericPart]) poMap[numericPart] = {};
      var prefix = num.replace(/[0-9].*/, "");
      poMap[numericPart][prefix] = po;
    });

    prog("Calculando márgenes...");

    // ── ONE ROW PER SO, igual que QUIQUITO ────────────────────────────
    rows = soList.map(function(so) {
      var soNum = (so.docNumber || "").toUpperCase();
      var numericPart = soNum.replace(/^[A-Z]+/, "");
      var poEntry = poMap[numericPart] || {};
      var po  = poEntry["PO"] || null;
      var toD = poEntry["TO"] || null;
      var co  = poEntry["CO"] || null;

      var venta = gT(so);
      var tPO   = gT(po);
      var tTO   = gT(toD);
      var tCO   = gT(co);

      // Otros prefijos (OC, etc.)
      var tOther = 0;
      Object.keys(poEntry).forEach(function(pfx) {
        if (pfx !== "SO" && pfx !== "PO" && pfx !== "TO" && pfx !== "CO") tOther += gT(poEntry[pfx]);
      });

      var comm  = findComm(soNum);
      var tComm = comm ? comm.commission : 0;
      var mB    = venta - tPO;
      var mN    = mB - tTO - tCO - tComm - tOther;
      var pB    = venta ? (mB / venta) * 100 : null;
      var pN    = venta ? (mN / venta) * 100 : null;

      // Producto e incoterm — igual que QUIQUITO
      var producto = "";
      if (so.products && so.products[0]) producto = so.products[0].name || "";

      var incoterm = "";
      if (so.customFields) so.customFields.forEach(function(cf) {
        if (cf.field && cf.field.toUpperCase() === "INCOTERM") incoterm = cf.value || "";
      });

      // Volumen desde líneas
      var volKg = 0, volTon = 0;
      if (so.lines) so.lines.forEach(function(l) {
        var u = (l.unit || l.units || "").toString().toLowerCase().trim();
        var qty = parseFloat(l.quantity || l.qty || 0) || 0;
        if (u === "ton" || u === "t" || u === "mt" || u === "tn" || u === "tonnes" || u === "tonelada" || u === "toneladas") volTon += qty;
        else if (u === "kg" || u === "kgs" || u === "kilogram" || u === "kilograms" || u === "kilos") volKg += qty;
      });

      return {
        soNum: soNum, numericPart: numericPart,
        client: so.contactName || so.name || "",
        producto: producto, incoterm: incoterm,
        date: so.date || so.createdAt || 0,
        venta: venta, tPO: tPO, tTO: tTO, tCO: tCO, tComm: tComm, tOther: tOther,
        mB: mB, mN: mN, pB: pB, pN: pN,
        hasC: !!comm, hasPO: !!po,
        volKg: volKg, volTon: volTon
      };
    }).filter(function(r) { return r.venta > 0; });

    btn.textContent = "↺ Recargar"; btn.disabled = false;
    document.getElementById("sstrip").style.display = "block";
    document.getElementById("ctrls").style.display = "flex";
    updSum();
    applyF();

  } catch(err) {
    btn.disabled = false; btn.textContent = "⚡ Cargar operaciones";
    prog("Error: " + err.message, true);
    console.error(err);
  }
}

function updSum() {
  var tV=0, tB=0, tN=0, w=0;
  rows.forEach(function(r) { tV += r.venta; tB += r.mB; tN += r.mN; if (!r.hasC) w++; });
  document.getElementById("sTotal").textContent = rows.length;
  document.getElementById("sVenta").textContent = eur(tV);
  document.getElementById("sBruto").textContent = eur(tB);
  document.getElementById("sBruto").className = "sv " + (tB >= 0 ? "g" : "r");
  document.getElementById("sBrP").textContent = pct(tV ? (tB/tV)*100 : null) + " s/venta";
  document.getElementById("sNeto").textContent = eur(tN);
  document.getElementById("sNeto").className = "sv " + (tN >= 0 ? "g" : "r");
  document.getElementById("sNeP").textContent = pct(tV ? (tN/tV)*100 : null) + " s/venta";
  document.getElementById("sWarn").textContent = w;
}

function applyF() {
  var txt = document.getElementById("fTxt").value.toLowerCase();
  var cf  = document.getElementById("fComm").value;
  var sf  = document.getElementById("fSort").value;
  var r   = rows.slice();
  if (txt) r = r.filter(function(x) {
    return (x.soNum||"").toLowerCase().indexOf(txt) !== -1 ||
           (x.client||"").toLowerCase().indexOf(txt) !== -1 ||
           (x.producto||"").toLowerCase().indexOf(txt) !== -1;
  });
  if (cf === "ok")   r = r.filter(function(x) { return x.hasC; });
  if (cf === "warn") r = r.filter(function(x) { return !x.hasC; });
  r.sort(function(a, b) {
    if (sf === "date_asc")   return (a.date||0) - (b.date||0);
    if (sf === "neto_desc")  return b.mN - a.mN;
    if (sf === "neto_asc")   return a.mN - b.mN;
    if (sf === "pct_desc")   return (b.pN != null ? b.pN : -999) - (a.pN != null ? a.pN : -999);
    if (sf === "venta_desc") return b.venta - a.venta;
    return (b.date||0) - (a.date||0);
  });
  document.getElementById("cTag").textContent = r.length + " de " + rows.length + " operaciones";
  renderT(r);
}

      : '<span class="ob">✓ ' + eur(x.tComm) + '</span>';
    var netoCell = w
      ? '<span class="vw">' + eur(x.mN) + '</span><br><span style="font-size:9px;color:var(--amber2)">confirmar comisión</span>'
      : '<span class="' + (x.mN >= 0 ? "vp" : "vn") + '">' + eur(x.mN) + '</span>';
    var pnCell = w
      ? '<span class="pp a">' + pct(x.pN) + ' ⚠</span>'
      : pp(x.pN);
    var poCell = x.tPO > 0
      ? '<span class="vn">-' + eur(x.tPO) + '</span>'
      : '<span class="vm">—' + (x.hasPO ? "" : " (sin PO)") + '</span>';

    html += '<tr class="' + (w ? "wr" : "") + '">';
    html += '<td class="dt">' + fmtD(x.date) + '</td>';
    html += '<td class="ped">' + x.soNum + '</td>';
    html += '<td class="cli" title="' + x.client + '">' + (x.client || "—") + '</td>';
    html += '<td class="pro" title="' + x.producto + '">' + (x.producto || "—") + '</td>';
    html += '<td class="inc">' + (x.incoterm || "—") + '</td>';
    html += '<td class="r">' + eur(x.venta) + '</td>';
    html += '<td class="r">' + poCell + '</td>';
    html += '<td class="r ' + (x.mB >= 0 ? "vp" : "vn") + '">' + eur(x.mB) + '</td>';
    html += '<td class="r">' + pp(x.pB) + '</td>';
    html += '<td class="r vn">' + (x.tTO > 0 ? '-' + eur(x.tTO) : '<span class="vm">—</span>') + '</td>';
    html += '<td class="r vn">' + (x.tCO > 0 ? '-' + eur(x.tCO) : '<span class="vm">—</span>') + '</td>';
    html += '<td class="r">' + commCell + '</td>';
    html += '<td class="r">' + netoCell + '</td>';
    html += '<td class="r">' + pnCell + '</td>';
    html += '<td class="r">' + volCell(x.mN, x.volTon, "ton") + '</td>';
    html += '<td class="r">' + volCell(x.mN, x.volKg, "kg") + '</td>';
    html += '</tr>';
  });
  html += '</tbody>';

  // TFOOT
  html += '<tfoot><tr>';
  html += '<td colspan="5" style="color:var(--muted);font-size:11px">TOTAL (' + r.length + ')</td>';
  html += '<td class="r">' + eur(tV) + '</td>';
  html += '<td class="r vn">-' + eur(tPO) + '</td>';
  html += '<td class="r ' + (tB >= 0 ? "vp" : "vn") + '">' + eur(tB) + '</td>';
  html += '<td class="r">' + pp(pB) + '</td>';
  html += '<td class="r vn">-' + eur(tTO) + '</td>';
  html += '<td class="r vn">-' + eur(tCO) + '</td>';
  html += '<td class="r vn">-' + eur(tComm) + '</td>';
  html += '<td class="r ' + (tN >= 0 ? "vp" : "vn") + '">' + eur(tN) + '</td>';
  html += '<td class="r">' + pp(pN) + '</td>';
  html += '<td class="r vm">—</td>';
  html += '<td class="r vm">—</td>';
  html += '</tr></tfoot>';

  html += '</table></div>';
  document.getElementById("main").innerHTML = html;
}

document.addEventListener("DOMContentLoaded", function() {
  loadCfg();
});
</script>
</body>
</html>
